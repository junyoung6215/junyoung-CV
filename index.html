<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Junyoung Kwon research portfolio and CV landing page" />
    <title>Junyoung Kwon | Research Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles/styles.css" />
    <script defer src="assets/scripts/main.js"></script>
  </head>
  <body>
    <div class="page-ambient" aria-hidden="true">
      <span class="ambient ambient-a"></span>
      <span class="ambient ambient-b"></span>
      <span class="ambient ambient-c"></span>
    </div>

    <header class="topbar">
      <div class="topbar-shell">
        <a class="brand" href="#hero" aria-label="Go to top">
          <span class="brand-title" data-profile="name"></span>
          <span class="brand-sub" data-i18n="brand_role"></span>
        </a>

        <nav class="topnav" aria-label="Primary">
          <a href="#trajectory" data-i18n="nav_story"></a>
          <a href="#spotlight" data-i18n="nav_spotlight"></a>
          <a href="#projects" data-i18n="nav_projects"></a>
          <a href="#toolkit" data-i18n="nav_toolkit"></a>
          <a href="#contact" data-i18n="nav_contact"></a>
        </nav>

        <div class="lang-toggle" role="group" aria-label="Language toggle">
          <button type="button" class="lang-btn" data-lang-btn="en">EN</button>
          <button type="button" class="lang-btn" data-lang-btn="ko">KR</button>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <section id="hero" class="hero-stage reveal" aria-labelledby="hero-title">
        <article class="hero-intro surface">
          <p class="eyebrow" data-i18n="hero_label"></p>
          <h1 id="hero-title" class="display" data-profile="name"></h1>
          <p class="headline" data-profile-lang="headline"></p>
          <div class="prose hero-prose" data-section="hero"></div>

          <div class="focus-row" id="focus-row" aria-label="Research focus areas"></div>
          <div class="cta-row">
            <a class="btn btn-primary" href="#projects" data-i18n="cta_projects"></a>
            <a class="btn btn-secondary" data-resume="pdf" target="_blank" rel="noreferrer" data-i18n="cta_resume_pdf"></a>
            <a class="btn btn-tertiary" data-resume="docx" target="_blank" rel="noreferrer" data-i18n="cta_resume_docx"></a>
          </div>
        </article>

        <aside class="hero-summary surface">
          <div class="portrait-wrap">
            <img
              id="profile-image"
              class="hero-photo"
              src="assets/images/profile/profile-placeholder.svg"
              alt="Junyoung Kwon profile portrait"
            />
          </div>

          <div class="summary-block">
            <p class="mini-label" data-i18n="hero_current"></p>
            <p class="status-line" data-i18n="hero_status"></p>
          </div>

          <div class="summary-block">
            <p class="mini-label" data-i18n="hero_focus_title"></p>
            <div class="signal-list" id="focus-list"></div>
          </div>
        </aside>
      </section>

      <section class="metrics-strip reveal" aria-label="Key metrics">
        <div class="metric-grid" id="metric-row"></div>
      </section>

      <section id="trajectory" class="row-section reveal" aria-labelledby="trajectory-title">
        <div class="row-head">
          <p class="section-kicker" data-i18n="section_story_kicker"></p>
          <h2 id="trajectory-title" data-i18n="section_story"></h2>
        </div>

        <div class="row-body row-body-three">
          <article class="feature-panel surface" id="about">
            <p class="card-tag" data-i18n="section_about_tag"></p>
            <h3 data-i18n="section_about"></h3>
            <div class="prose" data-section="about"></div>
          </article>

          <article class="surface detail-panel" id="education">
            <p class="card-tag" data-i18n="section_education_tag"></p>
            <h3 data-i18n="section_education"></h3>
            <div id="education-summary" class="education-summary"></div>
          </article>

          <article class="surface detail-panel" id="contact-snapshot">
            <p class="card-tag" data-i18n="hero_contact_title"></p>
            <a class="inline-email" data-email-link></a>
            <div class="prose compact-prose" data-section="contact"></div>
            <div id="social-links" class="social-links"></div>
          </article>
        </div>
      </section>

      <section id="experience" class="row-section reveal" aria-labelledby="experience-title">
        <div class="row-head">
          <p class="section-kicker" data-i18n="section_experience_tag"></p>
          <h2 id="experience-title" data-i18n="section_experience"></h2>
        </div>

        <div id="experience-track" class="experience-track"></div>
      </section>

      <section id="spotlight" class="row-section reveal" aria-labelledby="spotlight-title">
        <div class="row-head">
          <p class="section-kicker" data-i18n="section_spotlight_kicker"></p>
          <h2 id="spotlight-title" data-i18n="section_spotlight"></h2>
        </div>

        <div class="row-body row-body-three">
          <article class="surface detail-panel" id="awards">
            <p class="card-tag" data-i18n="section_awards_tag"></p>
            <h3 data-i18n="section_awards"></h3>
            <div id="awards-list" class="awards-list"></div>
          </article>

          <article class="surface detail-panel" id="media">
            <p class="card-tag" data-i18n="section_media_tag"></p>
            <h3 data-i18n="section_media"></h3>
            <div class="prose" data-section="media"></div>
          </article>

          <article class="surface detail-panel" id="publications">
            <p class="card-tag" data-i18n="section_publications_tag"></p>
            <h3 data-i18n="section_publications"></h3>
            <div class="prose" data-section="publications"></div>
          </article>
        </div>
      </section>

      <section id="projects" class="row-section reveal" aria-labelledby="projects-title">
        <div class="row-head">
          <p class="section-kicker" data-i18n="section_projects_kicker"></p>
          <h2 id="projects-title" data-i18n="section_projects"></h2>
        </div>

        <div id="projects-grid" class="projects-grid"></div>
      </section>

      <section id="toolkit" class="row-section reveal" aria-labelledby="toolkit-title">
        <div class="row-head">
          <p class="section-kicker" data-i18n="section_toolkit_kicker"></p>
          <h2 id="toolkit-title" data-i18n="section_toolkit"></h2>
        </div>

        <div class="row-body row-body-three">
          <article class="surface detail-panel" id="skills">
            <p class="card-tag" data-i18n="section_skills_tag"></p>
            <h3 data-i18n="section_skills"></h3>
            <div id="skills-groups" class="skills-groups"></div>
          </article>

          <article class="surface detail-panel" id="languages">
            <p class="card-tag" data-i18n="section_languages_tag"></p>
            <h3 data-i18n="section_languages"></h3>
            <div id="languages-strip" class="languages-strip"></div>
          </article>

          <article class="surface detail-panel" id="references">
            <p class="card-tag" data-i18n="section_references_tag"></p>
            <h3 data-i18n="section_references"></h3>
            <div id="reference-card" class="reference-card"></div>
          </article>
        </div>
      </section>

      <section id="contact" class="row-section reveal" aria-labelledby="contact-title">
        <div class="row-head">
          <p class="section-kicker" data-i18n="section_contact_kicker"></p>
          <h2 id="contact-title" data-i18n="section_contact"></h2>
        </div>

        <article class="contact-panel surface">
          <div class="contact-copy">
            <div class="prose" data-section="contact"></div>
          </div>

          <div class="contact-actions">
            <p class="contact-label" data-i18n="contact_email"></p>
            <a class="contact-email" data-email-link></a>
            <div class="cta-row">
              <a class="btn btn-secondary" data-resume="pdf" target="_blank" rel="noreferrer" data-i18n="cta_resume_pdf"></a>
              <a class="btn btn-tertiary" data-resume="docx" target="_blank" rel="noreferrer" data-i18n="cta_resume_docx"></a>
            </div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
